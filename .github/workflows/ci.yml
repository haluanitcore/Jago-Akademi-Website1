name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Types · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (reproducible)
        run: npm ci

      - name: Generate Prisma client
        run: npm run --workspace api exec -- prisma generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check-types

      - name: Test (with coverage + threshold gate)
        run: npm run --workspace api test:coverage

      - name: Build
        run: npm run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          if-no-files-found: ignore
          retention-days: 7
