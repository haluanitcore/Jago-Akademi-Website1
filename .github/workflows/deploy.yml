name: Deploy

# CD (TASK-020): build images → push GHCR → SSH deploy → migrate → smoke test.
# Triggers: version tags (v*) or manual dispatch. The `production` environment
# should be configured with required reviewers in GitHub so every deploy still
# gets a human approval (SSOT §9.6).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/sha) to deploy"
        required: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Resolve version tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/api:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GA_ID=${{ vars.NEXT_PUBLIC_GA_ID }}
            NEXT_PUBLIC_APP_NAME=Jago Akademi
          tags: |
            ${{ env.IMAGE_BASE }}/web:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_BASE }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to production host
    needs: build-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Configure this environment in GitHub with required reviewers → human gate.
    environment: production
    steps:
      - name: Deploy over SSH (pull → migrate → up → prune)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            export API_IMAGE=${{ env.IMAGE_BASE }}/api:${{ needs.build-push.outputs.version }}
            export WEB_IMAGE=${{ env.IMAGE_BASE }}/web:${{ needs.build-push.outputs.version }}
            echo "$API_IMAGE" > .last-deploy-api && echo "$WEB_IMAGE" > .last-deploy-web
            docker compose -f docker-compose.prod.yml -f docker-compose.registry.yml pull api web
            # Migrations run before the app swap; backup safety is covered by the
            # pre-deploy backup step in RUNBOOK_DEPLOY.md (TASK-021 automates it).
            docker compose -f docker-compose.prod.yml -f docker-compose.registry.yml run --rm api npx prisma migrate deploy
            docker compose -f docker-compose.prod.yml -f docker-compose.registry.yml up -d --wait
            docker image prune -f

      - name: Smoke test
        run: |
          sleep 5
          curl -fsS --max-time 10 https://api.jagoakademi.com/api/health
          curl -fsS --max-time 10 -o /dev/null https://jagoakademi.com
          echo "Smoke test OK"
